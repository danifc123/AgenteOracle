@if (aberto()) {
  <div class="backdrop" (click)="fechar.emit()">
    <div class="painel" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
      <header class="cabecalho">
        <h2>{{ titulo() }}</h2>
        <button type="button" class="fechar" aria-label="Fechar" (click)="fechar.emit()">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 6 18 18M18 6 6 18" />
          </svg>
        </button>
      </header>

      <div class="conteudo">
        <ng-content></ng-content>
      </div>

      @if (temRodape()) {
        <footer class="rodape">
          <ng-content select="[rodape]"></ng-content>
        </footer>
      }
    </div>
  </div>
}
