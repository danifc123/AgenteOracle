<header class="page-header">
  <div>
    <p class="breadcrumb">Assistente IA</p>
    <h1>Converse com o Agente Oracle</h1>
  </div>
</header>

<section class="chat-card">
  <app-chat-mensagens
    [mensagens]="mensagens()"
    [enviando]="enviando()"
    [baixandoSql]="baixandoSql()"
    (baixarRelatorio)="baixarRelatorio($event)"
  />

  @if (erro()) {
    <p class="erro">{{ erro() }}</p>
  }

  <app-chat-entrada
    [entrada]="entrada()"
    [enviando]="enviando()"
    (entradaChange)="entrada.set($event)"
    (enviar)="enviar()"
  />
</section>
