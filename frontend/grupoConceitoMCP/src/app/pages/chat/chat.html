<app-modulo-header breadcrumb="Assistente IA" titulo="Converse com o Agente Oracle" />

<section class="chat-card">
  <app-chat-mensagens
    [mensagens]="mensagens()"
    [enviando]="enviando()"
    [baixandoSql]="baixandoSql()"
    (baixarRelatorio)="baixarRelatorio($event)"
  />

  @if (erro()) {
    <p class="erro">{{ erro() }}</p>
  }

  <app-chat-entrada
    [entrada]="entrada()"
    [enviando]="enviando()"
    (entradaChange)="entrada.set($event)"
    (enviar)="enviar()"
  />
</section>
