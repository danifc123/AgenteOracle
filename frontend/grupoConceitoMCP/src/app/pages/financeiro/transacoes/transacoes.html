<header class="page-header">
  <div>
    <p class="breadcrumb">Financeiro / Transações</p>
    <h1>Transações</h1>
  </div>
  <button type="button" class="btn-exportar" [disabled]="exportando()" (click)="exportarRelatorio()">
    @if (exportando()) {
      Gerando relatório...
    } @else {
      Exportar relatório
    }
  </button>
</header>

@if (erroExportacao()) {
  <p class="erro-exportacao">{{ erroExportacao() }}</p>
}

<app-tabela-transacoes [transacoes]="transacoes" />
