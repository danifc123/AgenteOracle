<div class="busca">
  <svg class="icone-busca" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="11" cy="11" r="7" />
    <path d="m21 21-4.3-4.3" stroke-linecap="round" />
  </svg>
  <input
    type="text"
    [value]="valor()"
    (input)="valor.set($any($event.target).value)"
    [placeholder]="placeholder()"
  />
  @if (valor()) {
    <button type="button" class="limpar" (click)="limpar()" aria-label="Limpar busca">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m6 6 12 12M18 6 6 18" stroke-linecap="round" />
      </svg>
    </button>
  }
</div>
