<header class="page-header">
  <div>
    <p class="breadcrumb">Financeiro / Transações</p>
    <h1>Transações</h1>
  </div>
  <app-botao
    variant="primaria"
    [loading]="exportando()"
    loadingText="Gerando relatório..."
    (clicked)="exportarRelatorio()"
  >
    Exportar relatório
  </app-botao>
</header>

@if (erroExportacao()) {
  <p class="erro-exportacao">{{ erroExportacao() }}</p>
}

@if (carregando()) {
  <p class="carregando">Carregando transações...</p>
} @else if (erroCarregamento()) {
  <p class="erro-exportacao">{{ erroCarregamento() }}</p>
} @else {
  <app-tabela-transacoes [transacoes]="transacoes" />
}
