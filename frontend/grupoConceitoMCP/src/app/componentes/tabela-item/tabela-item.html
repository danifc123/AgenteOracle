<div class="tabela-bloco">
  <button type="button"
          class="tabela-cabecalho"
          [class.tabela-cabecalho--aberta]="aberta()"
          (click)="alternarAberta.emit()">
    <span class="tabela-icone">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="16" rx="2" />
        <path d="M3 10h18M9 10v10" />
      </svg>
    </span>

    <span class="tabela-texto">
      <span class="tabela-nome">{{ tabela().descricao }}</span>
      <span class="tabela-categoria">
        {{ tabela().nome }}
        <span class="tabela-total-colunas">· {{ tabela().colunas.length }} colunas</span>
      </span>
    </span>

    @if (colunasSelecionadas().length) {
      <span class="tabela-contagem">{{ colunasSelecionadas().length }}</span>
    }

    <svg class="chevron" [class.chevron--aberta]="aberta()" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
      <path d="m9 6 6 6-6 6" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  @if (aberta()) {
    <div class="tabela-colunas">
      @for (coluna of tabela().colunas; track coluna.nome) {
        <label class="coluna-item" [title]="coluna.descricao">
          <input type="checkbox"
                 [checked]="estaSelecionada(coluna.nome)"
                 (change)="alternarColuna.emit(coluna.nome)" />
          <span>{{ coluna.nome }}</span>
        </label>
      }
    </div>
  }
</div>
