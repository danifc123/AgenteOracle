<button type="button"
        class="rotina-linha"
        [class.rotina-linha--ativa]="selecionada()"
        (click)="selecionar.emit()">
  <span class="rotina-icone">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z" />
      <path d="M17 21v-8H7v8" />
      <path d="M7 3v5h8" />
    </svg>
  </span>

  <span class="rotina-texto">
    <span class="rotina-nome">{{ rotina().nome }}</span>
    <span class="rotina-categoria">
      <span class="categoria-dot" [style.background]="corCategoria()"></span>
      {{ rotina().categoria }}
      @if (!rotina().apiEndpoint) {
        <span class="tag-em-breve">Em breve</span>
      }
    </span>
  </span>

  @if (!selecionada()) {
    <svg class="chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
      <path d="m9 6 6 6-6 6" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  }
</button>
