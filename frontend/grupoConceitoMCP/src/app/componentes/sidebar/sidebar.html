<button
  type="button"
  class="menu-toggle"
  (click)="toggleSidebar()"
  [attr.aria-expanded]="sidebarOpen()"
  aria-label="Abrir menu"
>
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round" />
  </svg>
</button>

@if (sidebarOpen()) {
  <div class="backdrop" (click)="closeSidebar()"></div>
}

<aside class="sidebar" [class.open]="sidebarOpen()">
  <div class="brand">
    <span class="brand-mark">GC</span>
    <span class="brand-name">Grupo Conceito</span>
  </div>

  <nav class="nav">
    <a
      class="nav-link"
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="closeSidebar()"
    >
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 11.5 12 4l8 7.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M6 10v9a1 1 0 0 0 1 1h3v-6h4v6h3a1 1 0 0 0 1-1v-9" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <span class="nav-label">Início</span>
    </a>

    <div class="nav-group">
      <button type="button" class="nav-link nav-parent" (click)="toggleFinanceiro()">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="6" width="18" height="13" rx="2" />
            <path d="M3 10h18M8 6V4h8v2" stroke-linecap="round" />
          </svg>
        </span>
        <span class="nav-label">Financeiro</span>
        <svg class="chevron" [class.rotated]="financeiroOpen()" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 9 6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>

      @if (financeiroOpen()) {
        <div class="nav-submenu">
          <a class="nav-sublink" routerLink="/financeiro/cadastros" routerLinkActive="active" (click)="closeSidebar()">
            Cadastros
          </a>
          <a class="nav-sublink" routerLink="/financeiro/movimentos" routerLinkActive="active" (click)="closeSidebar()">
            Movimentos
          </a>
          <a class="nav-sublink" routerLink="/financeiro/especifico-grupo-conceito" routerLinkActive="active" (click)="closeSidebar()">
            Específico Grupo Conceito
          </a>
        </div>
      }
    </div>

    <a
      class="nav-link"
      routerLink="/chat"
      routerLinkActive="active"
      (click)="closeSidebar()"
    >
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 5h16v11H8l-4 4V5Z" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <span class="nav-label">Assistente IA</span>
    </a>

    <a
      class="nav-link"
      routerLink="/relatorios/historico"
      routerLinkActive="active"
      (click)="closeSidebar()"
    >
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 8v4l3 3" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="12" cy="12" r="9" />
        </svg>
      </span>
      <span class="nav-label">Histórico de relatórios</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-avatar">GC</div>
    <div class="user-info">
      <span class="user-name">Usuário</span>
      <span class="user-role">Administrador</span>
    </div>
    <button type="button" class="sair" (click)="sair()" aria-label="Sair" title="Sair">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <path d="M16 17l5-5-5-5" />
        <path d="M21 12H9" />
      </svg>
    </button>
  </div>
</aside>
